<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Tooltip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<p>
  Проверяем как работают всплывающие подсказки.
  Подсказка сверху: <a href="#" class="has-tooltip" title="Подсказка сверху">Помогите пожалуйста.</a>
  Подсказка слева: <a href="#" class="has-tooltip" title="Слева" data-position="left">Слева</a>,
  <a href="#" class="has-tooltip" title="Справа" data-position="right">Справа</a>,
  Кликнуть по свободному месту тоже можно. Подсказка исчезнет. 
  <a href="#" class="has-tooltip" title="Снизу" data-position="bottom">Снизу</a>.
</p>

<script src="script.js"></script>

</body>
</html>
