<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Tooltip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<p>
  Проверяем как работают всплывающие подсказки. 
  <a href="#" class="has-tooltip" title="Подсказка сверху">Подсказка сверху</a>,
  <a href="#" class="has-tooltip" title="Слева" data-position="left">подсказка слева</a>,
  <a href="#" class="has-tooltip" title="Справа" data-position="right">подсказа справа (скрыть tooltip можно по нажатию в свободной области экрана)</a>,
  <a href="#" class="has-tooltip" title="Снизу" data-position="bottom">подсказка снизу</a>.
</p>

<script src="script.js"></script>

</body>
</html>
